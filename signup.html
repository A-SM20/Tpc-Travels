<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPC Travels Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/loginstyle.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    .back-home {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background-color: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 1000;
    }

    .back-home:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-home">
    <i class="fas fa-home"></i>
    Back to Home
  </a>
  <div class="login">
    <img src="bg6.jpg" alt="signup image" class="login__img">

    <form id="signupForm" class="login__form">
      <h1 class="login__title">Create Account</h1>

      <div class="login__content">
        <div class="login__box">
          <div class="login__box-input">
            <input type="text" required class="login__input" id="fullName" placeholder=" ">
            <label for="" class="login__label">Full Name</label>
          </div>
        </div>

        <div class="login__box">
          <div class="login__box-input">
            <input type="email" required class="login__input" id="email" placeholder=" ">
            <label for="" class="login__label">Email</label>
          </div>
        </div>

        <div class="login__box">
          <div class="login__box-input">
            <input type="password" required class="login__input" id="password" placeholder=" ">
            <label for="" class="login__label">Password</label>
          </div>
        </div>

        <div class="login__box">
          <div class="login__box-input">
            <input type="password" required class="login__input" id="confirmPassword" placeholder=" ">
            <label for="" class="login__label">Confirm Password</label>
          </div>
        </div>
      </div>

      <div class="login__check">
        <div class="login__check-group">
          <input type="checkbox" class="login__check-input" id="termsCheck" required>
          <label for="" class="login__check-label">I agree to the Terms & Conditions</label>
        </div>
      </div>

      <button type="submit" class="login__button" id="signupButton">Sign Up</button>

      <div class="login__divider">
        <span>OR</span>
      </div>

      <button type="button" id="googleSignUp" class="login__button google-button">
        <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon">
        Sign up with Google
      </button>

      <p class="login__register">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </form>
  </div>

  <script src="/js/firebase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/signup-page.js"></script>
</body>
</html>

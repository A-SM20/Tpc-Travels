<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - TPC Travels</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
      body {
        background: linear-gradient(135deg, #039be5, #0288d1);
        color: white;
        font-family: 'Poppins', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 480px;
      }
      h1 { font-size: 5rem; margin: 0; opacity: 0.9; }
      h2 { font-size: 1.5rem; font-weight: 600; margin: 0.5rem 0 1rem; }
      p { opacity: 0.85; line-height: 1.6; margin-bottom: 2rem; }
      .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
      a {
        display: inline-block;
        padding: 12px 24px;
        background: white;
        color: #0288d1;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      a:hover { transform: translateY(-2px); }
      a.secondary {
        background: rgba(255,255,255,0.2);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or may have been moved.</p>
      <div class="links">
        <a href="/index.html">Home</a>
        <a href="/pages/main.html" class="secondary">Travel Page</a>
        <a href="/login.html" class="secondary">Login</a>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TPC Travels Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="loginstyle.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    .back-home {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background-color: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      z-index: 1000;
    }

    .back-home:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-home">
    <i class="fas fa-home"></i>
    Back to Home
  </a>
  <div class="login">
    <img src="bg6.jpg" alt="login image" class="login__img">

    <form id="loginForm" class="login__form">
      <h1 class="login__title">TPC Travels Login</h1>

      <div class="login__content">
        <div class="login__box">
          <i class="bx bx-lock-alt"></i>
          
          <div class="login__box-input">
            <input type="email" required class="login__input" id="email" placeholder=" ">
            <label for="" class="login__label">Username</label>
          </div>
        </div>

        <div class="login__box">
          <div class="login__box-input">
            <input type="password" required class="login__input" id="password" placeholder=" ">
            <label for="" class="login__label">Password</label>
           </div>
        </div>
      </div>

      <div class="login__check">
        <div class="login__check-group">
          <input type="checkbox" class="login__check-input" id="rememberMe">
          <label for="" class="login__check-label">Remember me</label>
        </div>
        <a href="#" class="login__forgot">Forgot Password?</a>
      </div>

      <button type="submit" class="login__button" id="loginButton">Login</button>

      <div class="login__divider">
        <span>OR</span>
      </div>

      <button type="button" id="googleLogin" class="login__button google-button">
        <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon">
        Login with Google
      </button>

      <p class="login__register">
        Don't have an account? <a href="signup.html">Register</a>
      </p>
    </form>
  </div>

  <!-- Firebase Configuration -->
  <script>
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyB0RAzn8Cu-49BpAKuuUr-N79ezda9e9qo",
      authDomain: "tpc-travels.firebaseapp.com",
      projectId: "tpc-travels",
      storageBucket: "tpc-travels.firebasestorage.app",
      messagingSenderId: "404762624068",
      appId: "1:404762624068:web:d366c0940d9514ff063c11"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Check if user is already logged in
    auth.onAuthStateChanged((user) => {
      if (user) {
        // User is signed in, redirect to landing page
        window.location.href = '../tpc landing/main.html';
      }
    });

    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const loginButton = document.getElementById('loginButton');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      try {
        // Disable button and show loading state
        loginButton.disabled = true;
        loginButton.textContent = 'Logging in...';

        // Set persistence based on remember me checkbox
        if (rememberMe) {
          await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        } else {
          await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        }

        // Sign in with email and password
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Store last login time in localStorage
        localStorage.setItem('lastLogin', new Date().toISOString());
        
        // Redirect will happen automatically via onAuthStateChanged
      } catch (error) {
        console.error('Error:', error);
        alert(error.message);
        // Reset button state
        loginButton.disabled = false;
        loginButton.textContent = 'Login';
      }
    });

    // Handle Google Login
    document.getElementById('googleLogin').addEventListener('click', async () => {
      const googleButton = document.getElementById('googleLogin');
      try {
        // Disable button and show loading state
        googleButton.disabled = true;
        googleButton.textContent = 'Connecting...';

        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        const user = result.user;

        // Store last login time in localStorage
        localStorage.setItem('lastLogin', new Date().toISOString());
        
        // Redirect will happen automatically via onAuthStateChanged
      } catch (error) {
        console.error('Error:', error);
        alert(error.message);
        // Reset button state
        googleButton.disabled = false;
        googleButton.textContent = 'Login with Google';
      }
    });
  </script>
</body>
</html>
